services:
  database:
    image: postgres:16
    container_name: milla_inventory_db
    environment:
      POSTGRES_DB: milla_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - milla_inventory_data:/var/lib/postgresql/data
      - ./database/MillaInventory.sql:/docker-entrypoint-initdb.d/01-milla-inventory.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d milla_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: milla_inventory_backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://database:5432/milla_inventory
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      JWT_SECRET: abcdefghijaklmnopqrstuvwxyz1234567890
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: milla_inventory_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  milla_inventory_data:
